<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1020" viewBox="0 0 1500 1020" role="img" aria-labelledby="title desc">
  <title id="title">Longitudinal framework for screening adolescent pathway variables</title>
  <desc id="desc">Conceptual figure showing childhood social-determinant classes, adolescent screened pathway variables, adolescent depressive symptoms, and the co-created local pathway inventory used as contextual grounding rather than as an additional modeled component.</desc>

  <defs>
    <style>
      .title { font: 700 36px Arial, Helvetica, sans-serif; fill: #133b63; }
      .subtitle { font: 600 16px Arial, Helvetica, sans-serif; fill: #5a7088; letter-spacing: 1.2px; }
      .panel-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #133b63; }
      .panel-text { font: 500 15px Arial, Helvetica, sans-serif; fill: #243746; }
      .note-text { font: 500 14px Arial, Helvetica, sans-serif; fill: #4c6071; }
      .small-text { font: 500 12px Arial, Helvetica, sans-serif; fill: #5f7180; }
      .arrow-label { font: 700 12px Arial, Helvetica, sans-serif; fill: #5f7180; }
      .chip-text { font: 700 14px Arial, Helvetica, sans-serif; fill: #133b63; }
      .chip-note { font: 500 13px Arial, Helvetica, sans-serif; fill: #5f7180; }
      .bullet-text { font: 500 14px Arial, Helvetica, sans-serif; fill: #243746; }
    </style>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#2d5f8b"/>
    </marker>
    <marker id="arrow-orange" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#f28c34"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#9fb0c1" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1500" height="1020" fill="#fbfcfe"/>

  <text x="80" y="70" class="title">Longitudinal framework for screening adolescent pathway variables</text>
  <text x="80" y="105" class="subtitle">BEHAVIORAL MEDIATORS LINKING CHILDHOOD SOCIAL DETERMINANTS TO ADOLESCENT DEPRESSIVE SYMPTOMS</text>
  <line x1="80" y1="128" x2="1420" y2="128" stroke="#d6e0ea" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="60" y="170" rx="22" ry="22" width="390" height="260" fill="#ffffff" stroke="#c8d6e4" stroke-width="2"/>
    <rect x="60" y="170" rx="22" ry="22" width="390" height="58" fill="#ecf4fb" stroke="#c8d6e4" stroke-width="2"/>
    <text x="88" y="206" class="panel-title">Childhood social-determinant classes</text>

    <rect x="90" y="250" rx="16" ry="16" width="140" height="118" fill="#f7fbff" stroke="#2d5f8b" stroke-width="2"/>
    <text x="160" y="283" text-anchor="middle" class="chip-text">Early</text>
    <text x="160" y="309" text-anchor="middle" class="panel-text">(0-5 years)</text>
    <text x="160" y="339" text-anchor="middle" class="chip-note">latent class</text>
    <text x="160" y="359" text-anchor="middle" class="chip-note">membership</text>

    <rect x="260" y="250" rx="16" ry="16" width="160" height="118" fill="#f7fbff" stroke="#2d5f8b" stroke-width="2"/>
    <text x="340" y="286" text-anchor="middle" class="chip-text">Middle-late</text>
    <text x="340" y="312" text-anchor="middle" class="panel-text">(6-12 years)</text>
    <text x="340" y="340" text-anchor="middle" class="chip-note">latent class</text>
    <text x="340" y="360" text-anchor="middle" class="chip-note">membership</text>

    <text x="90" y="400" class="small-text">Windows are modeled separately to preserve</text>
    <text x="90" y="418" class="small-text">developmental interpretation.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="150" rx="22" ry="22" width="560" height="430" fill="#ffffff" stroke="#c8d6e4" stroke-width="2"/>
    <rect x="500" y="150" rx="22" ry="22" width="560" height="58" fill="#fff2e5" stroke="#c8d6e4" stroke-width="2"/>
    <text x="530" y="188" class="panel-title">Adolescent pathway block</text>
    <text x="530" y="224" class="note-text">Candidate proximal pathway indicators screened in the present manuscript</text>

    <rect x="530" y="255" rx="14" ry="14" width="210" height="58" fill="#fffaf5" stroke="#f28c34" stroke-width="2"/>
    <text x="635" y="291" text-anchor="middle" class="chip-text">Alcohol use</text>

    <rect x="770" y="255" rx="14" ry="14" width="260" height="58" fill="#fffaf5" stroke="#f28c34" stroke-width="2"/>
    <text x="900" y="283" text-anchor="middle" class="chip-text">Ever had sexual</text>
    <text x="900" y="303" text-anchor="middle" class="chip-text">intercourse</text>

    <rect x="530" y="333" rx="14" ry="14" width="210" height="58" fill="#fffaf5" stroke="#f28c34" stroke-width="2"/>
    <text x="635" y="369" text-anchor="middle" class="chip-text">Food insecurity</text>

    <rect x="770" y="333" rx="14" ry="14" width="260" height="58" fill="#fffaf5" stroke="#f28c34" stroke-width="2"/>
    <text x="900" y="359" text-anchor="middle" class="chip-text">Lack of government</text>
    <text x="900" y="379" text-anchor="middle" class="chip-text">grant receipt</text>

    <rect x="530" y="411" rx="14" ry="14" width="210" height="58" fill="#fffaf5" stroke="#f28c34" stroke-width="2"/>
    <text x="635" y="447" text-anchor="middle" class="chip-text">Low social support</text>

    <rect x="770" y="411" rx="14" ry="14" width="260" height="58" fill="#fffaf5" stroke="#f28c34" stroke-width="2"/>
    <text x="900" y="437" text-anchor="middle" class="chip-text">School</text>
    <text x="900" y="457" text-anchor="middle" class="chip-text">disengagement</text>

    <rect x="650" y="489" rx="14" ry="14" width="260" height="58" fill="#fffaf5" stroke="#f28c34" stroke-width="2"/>
    <text x="780" y="525" text-anchor="middle" class="chip-text">Violence exposure</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1120" y="210" rx="22" ry="22" width="320" height="180" fill="#ffffff" stroke="#c8d6e4" stroke-width="2"/>
    <rect x="1120" y="210" rx="22" ry="22" width="320" height="64" fill="#ecf4fb" stroke="#c8d6e4" stroke-width="2"/>
    <text x="1280" y="245" text-anchor="middle" class="panel-title">Adolescent depressive</text>
    <text x="1280" y="268" text-anchor="middle" class="panel-title">symptoms</text>
    <text x="1280" y="320" text-anchor="middle" class="panel-text">Harmonized binary</text>
    <text x="1280" y="346" text-anchor="middle" class="panel-text">endpoint</text>
  </g>

  <line x1="450" y1="300" x2="500" y2="300" stroke="#2d5f8b" stroke-width="3.5" marker-end="url(#arrow-blue)"/>
  <line x1="1060" y1="300" x2="1120" y2="300" stroke="#2d5f8b" stroke-width="3.5" marker-end="url(#arrow-blue)"/>

  <text x="475" y="334" text-anchor="middle" class="arrow-label">A-path screening</text>
  <text x="1090" y="334" text-anchor="middle" class="arrow-label">B-path screening</text>

  <g filter="url(#shadow)">
    <rect x="60" y="620" rx="22" ry="22" width="1380" height="320" fill="#ffffff" stroke="#f0bf8a" stroke-width="2" stroke-dasharray="10 7"/>
    <rect x="60" y="620" rx="22" ry="22" width="1380" height="56" fill="#fff7ee" stroke="#f0bf8a" stroke-width="2" stroke-dasharray="10 7"/>
    <text x="750" y="656" text-anchor="middle" class="panel-title">Co-created local pathway inventory</text>

    <text x="410" y="712" text-anchor="middle" class="bullet-text">&#8226; Contextual grounding for pathway</text>
    <text x="410" y="734" text-anchor="middle" class="bullet-text">selection and interpretation.</text>

    <text x="410" y="774" text-anchor="middle" class="bullet-text">&#8226; Not analyzed as an extra component</text>
    <text x="410" y="796" text-anchor="middle" class="bullet-text">in the same statistical model.</text>

    <text x="410" y="836" text-anchor="middle" class="bullet-text">&#8226; Provides support for food strain</text>
    <text x="410" y="858" text-anchor="middle" class="bullet-text">and violence exposure.</text>

    <text x="410" y="898" text-anchor="middle" class="bullet-text">&#8226; Captures unsafe environments</text>
    <text x="410" y="920" text-anchor="middle" class="bullet-text">and substance-related risk.</text>

    <text x="1090" y="712" text-anchor="middle" class="bullet-text">&#8226; Highlights insecure access to</text>
    <text x="1090" y="734" text-anchor="middle" class="bullet-text">material support.</text>

    <text x="1090" y="774" text-anchor="middle" class="bullet-text">&#8226; Identifies school climate and</text>
    <text x="1090" y="796" text-anchor="middle" class="bullet-text">family separation.</text>

    <text x="1090" y="836" text-anchor="middle" class="bullet-text">&#8226; Includes housing and water</text>
    <text x="1090" y="858" text-anchor="middle" class="bullet-text">insecurity, plus exclusion.</text>

    <text x="1090" y="898" text-anchor="middle" class="bullet-text">&#8226; Notes service-access barriers</text>
    <text x="1090" y="920" text-anchor="middle" class="bullet-text">and spiritual or cultural support.</text>
  </g>

  <line x1="750" y1="620" x2="750" y2="556" stroke="#f28c34" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrow-orange)"/>

  <text x="80" y="996" class="small-text">Adjustment set in screened association models: sex, age, rural residence, and calendar year.</text>
</svg>
